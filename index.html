<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Engineering App</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">⚙️ Task Engineering App</div>
    <ul class="navbar-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="about.html">Acerca de</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>Gestor de Tareas</h1>
    <p class="subtitle">Organiza tus actividades de ingeniería de software.</p>

    <section class="task-form-section">
      <h2>Nueva Tarea</h2>
      <form id="taskForm">
        <input type="text" id="taskTitle" placeholder="Título de la tarea" required />
        <select id="taskPriority">
          <option value="alta">Alta</option>
          <option value="media" selected>Media</option>
          <option value="baja">Baja</option>
        </select>
        <button type="submit">Agregar Tarea</button>
      </form>
    </section>

    <section class="task-list-section">
      <h2>Tareas Registradas</h2>
      <ul id="taskList"></ul>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
